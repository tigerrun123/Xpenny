[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/farcaster/webhook"
  to = "/.netlify/functions/farcaster-webhook"
  status = 200

[[redirects]]
  from = "/webhook/farcaster"
  to = "/.netlify/functions/farcaster-webhook"
  status = 200

[[redirects]]
  from = "/api/openclaw/chat"
  to = "/.netlify/functions/openclaw-chat"
  status = 200

[[redirects]]
  from = "/api/neynar/mention"
  to = "/.netlify/functions/neynar-mention"
  status = 200
